<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكينة | Sakina ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="refined-logo" onclick="showPage('home')">
        <i class="fas fa-cloud main-cloud"></i>
        <span data-k="l_name">سكينة</span>
    </div>
    <nav>
        <ul>
            <li><a href="#" onclick="showPage('home')" id="n-home" class="active" data-k="n1">إشراقة</a></li>
            <li><a href="#" onclick="showPage('support')" id="n-support" data-k="n2">مرفأ الأمان</a></li>
            <li><a href="#" onclick="showPage('relax')" id="n-relax" data-k="n3">عزف السكون</a></li>
            <li><a href="#" onclick="showPage('exercises')" id="n-ex" data-k="n4">غيمة البوح</a></li>
        </ul>
    </nav>
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">English</button>
</header>

<div id="home" class="page active">
    <h2 style="text-align: center; margin-bottom: 50px; color: var(--accent); font-weight: 900;" data-k="h_title">رسائل تفيض حباً لقلبك ✨</h2>
    <div class="grid" id="quotes-grid"></div>
</div>

<div id="support" class="page">
    <h2 style="text-align: center; margin-bottom: 40px; font-weight: 900;" data-k="s_title">مرفأ الأمان</h2>
    <h3 style="text-align: center; margin-bottom: 30px; color: var(--dark-mint);" data-k="t_student">ركن الطالب والدكتور 🎓</h3>
    <div class="grid" id="tips-grid" style="margin-bottom: 60px;"></div>
    <h2 style="text-align: center; margin-bottom: 30px; font-weight: 800;" data-k="b_main_title">مكتبة السكينة 📚</h2>
    <div class="grid" id="books-grid"></div>
</div>

<div id="relax" class="page">
    <h2 style="text-align: center; margin-bottom: 40px; font-weight: 900;" data-k="r_title">عزف السكون والطبيعة</h2>
    <div id="sounds-list" class="audio-grid" style="margin-bottom: 60px;"></div>
    <div class="cloud-card" style="max-width: 700px; margin: 0 auto; background: var(--bg);">
        <h3 data-k="q_title" style="margin-bottom: 20px;">سكينة الآيات</h3>
        <select id="q-select" onchange="const p=document.getElementById('qp'); if(this.value){p.src=this.value; p.play();}" class="btn-buy" style="width:100%; background:white; color:var(--text-color);">
            <option value="" data-k="q_choice">-- اختر سورتك --</option>
            <option value="https://server8.mp3quran.net/afs/001.mp3">سورة الفاتحة</option>
            <option value="https://server8.mp3quran.net/afs/002.mp3">سورة البقرة</option>
            <option value="https://server8.mp3quran.net/afs/018.mp3">سورة الكهف</option>
            <option value="https://server8.mp3quran.net/afs/055.mp3">سورة الرحمن</option>
        </select>
        <audio id="qp" controls style="margin-top: 20px;"></audio>
    </div>
</div>

<div id="exercises" class="page">
    <div style="text-align: center; margin-bottom: 80px;">
        <h2 id="b-txt" data-k="b_ready" style="color: var(--dark-mint);">استعدي لنفس عميق..</h2>
        <div id="breath-circle">🌸</div>
        <button class="btn-buy" onclick="runBreath()" id="b-btn" data-k="b_start">ابدأ التمرين</button>
    </div>
    
    <div class="vent-header-box">
        <h2 data-k="c_title">غيمة البوح ☁️</h2>
    </div>
    
    <div id="v-msg-area" style="min-height: 60px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 200;"></div>
    
    <div class="real-cloud-shape">
        <textarea id="v-input" data-k-ph="c_ph" placeholder="صبي ما يثقل كاهلك هنا.."></textarea>
    </div>
    
    <div style="text-align: center; margin-top: 40px;">
        <button class="btn-buy" onclick="toSky()" data-k="c_btn" style="padding: 15px 45px; font-size: 1.2rem;">أرسليها للغيوم</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
